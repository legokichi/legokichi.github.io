<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting to duxca.com</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="canonical" href="https://duxca.com/" />
  <script>
    var target = "https://duxca.com" + window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(target);
  </script>
</head>
<body>
  <p><a href="https://duxca.com/">duxca.com</a></p>
</body>
</html>
